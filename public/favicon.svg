<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="32" height="18" rx="7" fill="url(#shine)" opacity="0.4"/>
  <!-- Inner border -->
  <rect x="2.5" y="2.5" width="27" height="27" rx="5.5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Card emoji -->
  <text x="16" y="22" font-size="17" text-anchor="middle" fill="white" font-family="system-ui, sans-serif">🃏</text>
</svg>
